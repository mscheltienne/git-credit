name: release
on:  # yamllint disable-line rule:truthy
  release:
    types: [published]

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cross
        if: ${{ matrix.cross }}
      - name: Build
        run: |
          CMD=${{ matrix.cross && 'cross' || 'cargo' }}
          $CMD build --release --locked --target ${{ matrix.target }}
      - name: Package (Unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../git-credit-${{ matrix.target }}.tar.gz git-credit
          cd ../../..
      - name: Package (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../git-credit-${{ matrix.target }}.zip git-credit.exe
          cd ../../..
      - uses: actions/upload-artifact@v7
        with:
          name: git-credit-${{ matrix.target }}
          path: git-credit-${{ matrix.target }}.*

  publish:
    name: publish
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          tag_name: ${{ github.event.release.tag_name }}

  homebrew:
    name: homebrew
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate formula
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          SHA_MACOS_ARM=$(sha256sum artifacts/git-credit-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_MACOS_INTEL=$(sha256sum artifacts/git-credit-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM=$(sha256sum artifacts/git-credit-aarch64-unknown-linux-musl.tar.gz | cut -d' ' -f1)
          SHA_LINUX_INTEL=$(sha256sum artifacts/git-credit-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)
          BASE="https://github.com/mscheltienne/git-credit/releases/download/${VERSION}"

          cat > git-credit.rb << FORMULA
          class GitCredit < Formula
            desc "Precise per-author contribution stats that see through squash merges"
            homepage "https://github.com/mscheltienne/git-credit"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/git-credit-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
              on_intel do
                url "${BASE}/git-credit-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_INTEL}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/git-credit-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "${BASE}/git-credit-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_INTEL}"
              end
            end

            def install
              bin.install "git-credit"
            end

            test do
              system bin/"git-credit", "--version"
            end
          end
          FORMULA
      - uses: actions/checkout@v6
        with:
          repository: mscheltienne/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Push to homebrew-tap
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          cp git-credit.rb tap/Formula/git-credit.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/git-credit.rb
          git diff --staged --quiet || git commit -m "update git-credit to ${VERSION}"
          git push
